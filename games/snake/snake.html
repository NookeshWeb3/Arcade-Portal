<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game | Neon Arcade</title>
    <link rel="stylesheet" href="snake.css">
    <style>
        /* Game Over Popup Styles */
        .game-result-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: popupFade 0.3s ease-out;
        }
        .popup-content {
            background: #1a1a2e;
            border: 3px solid #00f2ff;
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 0 30px #00f2ff;
            color: white;
            max-width: 400px;
            width: 90%;
        }
        .result-score {
            font-size: 4rem;
            font-weight: bold;
            color: #00f2ff;
            margin: 1rem 0;
            text-shadow: 0 0 10px #00f2ff;
        }
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-box-small {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-label {
            font-size: 0.8rem;
            color: #aaa;
            display: block;
            margin-bottom: 0.5rem;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .popup-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .primary-btn {
            background: #00f2ff;
            color: #000;
        }
        .secondary-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }
        .popup-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00f2ff;
        }
        @keyframes popupFade {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="stat-box">
                <span class="label">SCORE</span>
                <span id="scoreVal">0</span>
            </div>
            <div class="stat-box">
                <span class="label">BEST</span>
                <span id="highScoreVal">0</span>
            </div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="snakeGame" width="400" height="400"></canvas>
            <div id="game-overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">PAUSED</h2>
                    <p id="overlay-msg">Press SPACE to Resume</p>
                    <button id="restart-btn" class="glow-button">RESTART</button>
                </div>
            </div>
        </div>

        <div class="mobile-controls">
            <div class="control-row">
                <button class="ctrl-btn" id="up-btn">▲</button>
            </div>
            <div class="control-row">
                <button class="ctrl-btn" id="left-btn">◀</button>
                <button class="ctrl-btn" id="down-btn">▼</button>
                <button class="ctrl-btn" id="right-btn">▶</button>
            </div>
        </div>
    </div>

    <!-- Result Popup -->
    <div id="result-popup" class="game-result-popup">
        <div class="popup-content">
            <h2 id="result-title">GAME OVER</h2>
            <div class="result-score" id="result-score">0</div>
            <div class="result-stats">
                <div class="stat-box-small">
                    <span class="stat-label">PERSONAL BEST</span>
                    <span class="stat-value" id="best-score">0</span>
                </div>
                <div class="stat-box-small">
                    <span class="stat-label">RANK</span>
                    <span class="stat-value" id="result-rank">-</span>
                </div>
            </div>
            <div class="btn-group">
                <button id="play-again-btn" class="popup-btn primary-btn">PLAY AGAIN</button>
                <button id="dashboard-btn" class="popup-btn secondary-btn">DASHBOARD</button>
            </div>
        </div>
    </div>

    <script src="snake.js"></script>
</body>
</html>
